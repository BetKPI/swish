<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<rect width="512" height="512" rx="96" fill="#0d1b2a"/>

<!-- Bold S made from a basketball arc + swoosh -->
<g transform="translate(256, 240)">
  <!-- Main S shape — thick, confident -->
  <path d="M95 -120 C-10 -130, -110 -90, -90 -30 C-70 30, 70 30, 90 30 C110 30, 110 90, 10 120"
        fill="none" stroke="#E87521" stroke-width="52" stroke-linecap="round"/>

  <!-- Basketball seam lines on the S -->
  <path d="M95 -120 C-10 -130, -110 -90, -90 -30 C-70 30, 70 30, 90 30 C110 30, 110 90, 10 120"
        fill="none" stroke="#c05a10" stroke-width="2" stroke-dasharray="0" opacity="0.4"/>

  <!-- Motion swoosh trailing the S -->
  <path d="M-20 130 Q-80 145, -120 125"
        fill="none" stroke="#c0a050" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M-35 148 Q-85 158, -110 145"
        fill="none" stroke="#c0a050" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
</g>

<!-- SWISH text -->
<text x="256" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" letter-spacing="10" fill="#f0f0f0">SWISH</text>
</svg>
