<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#10b981"/>

  <!-- Basketball arc / swoosh path -->
  <path d="M140 320 C160 180, 280 120, 340 160" stroke="white" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- Net lines hanging from the arc endpoint -->
  <path d="M340 160 L310 340" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <path d="M340 160 L340 350" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M340 160 L370 340" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- Cross threads of net -->
  <path d="M305 240 L375 240" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <path d="M300 300 L378 300" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
</svg>
